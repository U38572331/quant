<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEX SENTINEL | QUANT CORE</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="brand">GEX <span style="color:var(--primary)">SENTINEL</span></div>
            <div class="status-badge">
                <div class="pulse"></div>
                SYSTEM ONLINE
            </div>
        </header>

        <!-- MAIN GRID -->
        <div class="dashboard-grid">

            <!-- SPX MODULE -->
            <div class="panel" id="panel-spx">
                <div class="panel-header">
                    <div class="ticker">SPX</div>
                    <div class="panel-title">S&P 500 Index</div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card neutral">
                        <div class="metric-label">NET GEX</div>
                        <div class="metric-value" id="spx-netgex">--</div>
                    </div>
                    <div class="metric-card neutral">
                        <div class="metric-label">ZERO GAMMA (FLIP)</div>
                        <div class="metric-value" id="spx-zero">--</div>
                    </div>
                    <div class="metric-card bullish">
                        <div class="metric-label">CALL WALL</div>
                        <div class="metric-value" id="spx-call">--</div>
                    </div>
                    <div class="metric-card bearish">
                        <div class="metric-label">PUT WALL</div>
                        <div class="metric-value" id="spx-put">--</div>
                    </div>
                </div>
            </div>

            <!-- QQQ MODULE -->
            <div class="panel" id="panel-qqq">
                <div class="panel-header">
                    <div class="ticker">QQQ</div>
                    <div class="panel-title">Nasdaq-100</div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card neutral">
                        <div class="metric-label">NET GEX</div>
                        <div class="metric-value" id="qqq-netgex">--</div>
                    </div>
                    <div class="metric-card neutral">
                        <div class="metric-label">ZERO GAMMA (FLIP)</div>
                        <div class="metric-value" id="qqq-zero">--</div>
                    </div>
                    <div class="metric-card bullish">
                        <div class="metric-label">CALL WALL</div>
                        <div class="metric-value" id="qqq-call">--</div>
                    </div>
                    <div class="metric-card bearish">
                        <div class="metric-label">PUT WALL</div>
                        <div class="metric-value" id="qqq-put">--</div>
                    </div>
                </div>
            </div>

            <!-- AI ANALYSIS CONSOLE -->
            <div class="ai-console">
                <div class="console-header">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                    <span style="margin-left:auto; color:#666; font-size:0.8rem">AI_CORE_V9.2.EXE</span>
                </div>
                <div class="console-output" id="ai-output">INITIALIZING NEURAL NETWORKS...</div>
                <div class="cursor"></div>
            </div>

        </div>

        <footer>
            GENERATED BY ANTIGRAVITY // GEXSTREAM INTEGRATION
        </footer>

        <div style="position: absolute; bottom: 20px; right: 20px;">
            <button class="demo-switch" onclick="openModal()" style="margin-right:10px">[ MANUAL ENTRY ]</button>
            <button class="demo-switch" onclick="toggleDemo()">[ DEMO DATA ]</button>
        </div>
    </div>

    <!-- INPUT MODAL -->
    <div id="input-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">MANUAL DATA OVERRIDE</div>
            <div class="modal-body">
                <div class="input-group">
                    <label>SPX ZERO GAMMA</label>
                    <input type="text" id="in-zero" placeholder="e.g. 5240">
                </div>
                <div class="input-group">
                    <label>SPX CALL WALL</label>
                    <input type="text" id="in-call" placeholder="e.g. 5300">
                </div>
                <div class="input-group">
                    <label>SPX PUT WALL</label>
                    <input type="text" id="in-put" placeholder="e.g. 5150">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
                <button class="btn-confirm" onclick="submitManual()">// INJECT DATA</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
