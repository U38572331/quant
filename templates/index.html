<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgePro 3.0 AI Master Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060b;
            --glass: rgba(20, 23, 34, 0.85);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --success: #00ff9d;
            --error: #ff3e3e;
            --text: #ffffff;
            --text-dim: #a0aec0;
            --gold: #ffcc33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: default; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1b26 0%, #05060b 100%),
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            padding: 25px;
        }

        h1, h2, h3 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .title-group h1 {
            font-weight: 900;
            font-size: 24px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            height: calc(100vh - 120px);
        }

        .side-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 8px; height: 8px; border-radius: 50%; background: #444;
        }

        .status-indicator.active {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .metric-row {
            display: flex; justify-content: space-between;
            margin-bottom: 10px; font-size: 12px;
        }

        .metric-val {
            font-family: 'Orbitron'; color: var(--accent);
        }

        .review-station {
            display: flex; flex-direction: column; height: 100%;
        }

        .proposal-list {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 15px;
            padding-right: 10px;
        }

        .proposal-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .proposal-item:hover {
            border-color: var(--accent);
            background: rgba(0, 242, 255, 0.05);
        }

        .item-stats {
            display: flex; gap: 20px; margin: 10px 0;
        }

        .stat-box { font-size: 10px; }
        .stat-box strong { display: block; font-size: 14px; font-family: 'Orbitron'; color: var(--gold); }

        .btn {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 15px;
            border-radius: 5px;
            font-family: 'Orbitron';
            font-size: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-right: 10px;
        }

        .btn:hover { background: var(--accent); color: #000; }

        .btn.approve { border-color: var(--success); color: var(--success); }
        .btn.approve:hover { background: var(--success); color: #000; }

        #clock { font-family: 'Orbitron'; color: var(--accent); font-size: 18px; }

        .log-panel {
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 12px;
            font-family: monospace;
            font-size: 10px;
            color: var(--success);
            height: 80px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-group">
            <h1>FORGEPRO 3.0 MASTER</h1>
            <div style="font-size: 10px; color: var(--text-dim);">AI STRATEGIC ADVISOR & 15Y DISCOVERY ENGINE</div>
        </div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="main-layout">
        <div class="side-stack">
            <!-- AGENT STATUS -->
            <div class="glass-card">
                <div class="card-label"><div id="agent-dot" class="status-indicator"></div>ENGINE STATUS</div>
                <div class="metric-row"><span>Discovery:</span> <span id="agent-status" class="metric-val">OFFLINE</span></div>
                <div class="metric-row"><span>Generation:</span> <span id="agent-gen" class="metric-val">--</span></div>
                <div class="metric-row"><span>Best Sharpe:</span> <span id="agent-sharpe" class="metric-val">--</span></div>
            </div>

            <!-- VAULT STATUS -->
            <div class="glass-card">
                <div class="card-label">VAULT REPOSITORY</div>
                <div class="metric-row"><span>Queue Items:</span> <span id="queue-count" class="metric-val">0</span></div>
                <button class="btn" style="width: 100%;" onclick="openVault()">OPEN VAULT FOLDER</button>
            </div>

            <div class="log-panel" id="log">[SYS] Engine initialized. Awaiting AI proposals...</div>
        </div>

        <!-- REVIEW STATION -->
        <div class="glass-card review-station">
            <div class="card-label">AI STRATEGIC REVIEW STATION</div>
            <div class="proposal-list" id="proposal-list">
                <!-- Proposals injected here -->
                <div style="color: var(--text-dim); text-align: center; margin-top: 50px;">Awaiting High-Sharpe Proposals from Forge Agent...</div>
            </div>
        </div>
    </div>

    <script>
        async function updateData() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                document.getElementById('agent-dot').className = data.agent.status === 'Running' ? 'status-indicator active' : 'status-indicator';
                document.getElementById('agent-status').innerText = data.agent.status.toUpperCase();
                document.getElementById('agent-gen').innerText = data.agent.generation || '--';
                document.getElementById('agent-sharpe').innerText = (data.agent.best_sharpe || 0).toFixed(2);
                document.getElementById('queue-count').innerText = data.queue_count;

                // Update Proposal List
                const listRes = await fetch('/api/review/list');
                const list = await listRes.json();
                const container = document.getElementById('proposal-list');
                
                if (list.length === 0) {
                    container.innerHTML = '<div style="color: var(--text-dim); text-align: center; margin-top: 50px;">Scanning 15Y Data... Awaiting AI Insight.</div>';
                } else {
                    container.innerHTML = list.reverse().map((strat, i) => `
                        <div class="proposal-item">
                            <div style="font-size: 14px; font-weight: 600; color: var(--accent);">${strat.description}</div>
                            <div class="item-stats">
                                <div class="stat-box">Sharpe<strong>${(strat.sharpe || 0).toFixed(2)}</strong></div>
                                <div class="stat-box">Win Rate<strong>${((strat.win_rate || 0) * 100).toFixed(1)}%</strong></div>
                                <div class="stat-box">Trades<strong>${strat.total_trades || 0}</strong></div>
                                <div class="stat-box">PF<strong>${(strat.profit_factor || 0).toFixed(2)}</strong></div>
                                <div class="stat-box">MDD<strong>${(strat.mdd || 0).toFixed(1)}</strong></div>
                            </div>
                            <button class="btn approve" onclick="approveStrategy(${list.length - 1 - i})">APPROVE & VAULT</button>
                        </div>
                    `).join('');
                }

            } catch (e) { console.error(e); }
        }

        async function approveStrategy(id) {
            log(`[ADMIN] Approving Strategy #${id}...`);
            await fetch('/api/review/approve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id})
            });
            updateData();
        }

        async function openVault() {
            fetch('/api/open_vault', { method: 'POST' });
        }

        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
            l.scrollTop = l.scrollHeight;
        }

        setInterval(updateData, 2000);
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
        updateData();
    </script>
</body>
</html>
