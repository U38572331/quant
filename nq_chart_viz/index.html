<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NQ 5-Minute Chart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #131722;
            color: #d1d4dc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            /* Prevent body scroll, chart handles it */
        }

        #chart-container {
            width: 100vw;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            /* Make sure it's on top */
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
        }
    </style>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body>
    <div id="loading">Loading data...</div>
    <div id="chart-container"></div>

    <script>
        async function loadChart() {
            const chartContainer = document.getElementById('chart-container');
            const loading = document.getElementById('loading');

            try {
                if (typeof LightweightCharts === 'undefined') {
                    throw new Error("LightweightCharts library not loaded. Check internet connection.");
                }

                // Create Chart
                const chart = LightweightCharts.createChart(chartContainer, {
                    layout: {
                        background: { type: 'solid', color: '#131722' },
                        textColor: '#d1d4dc',
                    },
                    grid: {
                        vertLines: { color: '#2B2B43' },
                        horzLines: { color: '#2B2B43' },
                    },
                    crosshair: {
                        mode: LightweightCharts.CrosshairMode.Normal,
                    },
                    rightPriceScale: {
                        borderColor: 'rgba(197, 203, 206, 0.8)',
                    },
                    timeScale: {
                        borderColor: 'rgba(197, 203, 206, 0.8)',
                        timeVisible: true,
                        secondsVisible: false,
                    },
                });

                // Make it responsive
                window.addEventListener('resize', () => {
                    chart.resize(window.innerWidth, window.innerHeight);
                });

                // Create Candlestick Series
                const candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#26a69a',
                    downColor: '#ef5350',
                    borderVisible: false,
                    wickUpColor: '#26a69a',
                    wickDownColor: '#ef5350',
                });

                // Fetch Data
                // Add cache buster
                const response = await fetch('chart_data.json?t=' + new Date().getTime());
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} - ${response.statusText}`);
                }
                const data = await response.json();

                console.log(`Loaded ${data.length} candles`);

                if (!Array.isArray(data) || data.length === 0) {
                    throw new Error("Data is empty or not an array");
                }

                candlestickSeries.setData(data);

                // Remove loading text
                loading.style.display = 'none';

                // Fit content
                chart.timeScale().fitContent();

            } catch (err) {
                console.error("Error loading chart:", err);
                loading.innerText = "Error: " + err.message;
                loading.style.color = "#ff5555";
            }
        }

        loadChart();
    </script>
</body>

</html>
