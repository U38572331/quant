<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum PnL Simulator | 1000 Paths</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="title-group">
            <h1>QUANTUM PNL SIMULATOR</h1>
        </div>
        <div class="controls">
            <div class="control-item">
                <label>Steps</label>
                <input type="number" id="stepsInput" value="100" min="10" max="500">
            </div>
            <div class="control-item">
                <label>Paths</label>
                <input type="number" id="pathsInput" value="1000" min="1" max="2000">
            </div>
            <div class="control-item">
                <label>Win Prob (%)</label>
                <input type="number" id="probInput" value="50" min="0" max="100">
            </div>
            <button id="runBtn">SIMULATE</button>
        </div>
    </header>

    <main>
        <div class="chart-container">
            <canvas id="pnlChart"></canvas>
        </div>
        <div class="stats-panel">
            <div class="stat-card">
                <h3>EXPECTATION</h3>
                <div class="value" id="expectedValue">0.00</div>
            </div>
            <div class="stat-card">
                <h3>WINNING PATHS %</h3>
                <div class="value" id="winRate">0.0%</div>
            </div>
            <div class="stat-card">
                <h3>MAX DRAWDOWN</h3>
                <div class="value" id="maxDrawdown">0.00</div>
            </div>
            <div class="distribution-chart">
                <canvas id="distChart"></canvas>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
