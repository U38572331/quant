<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom Clone (Three.js)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background-color: transparent;
            border: 2px solid #0f0;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #d00;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 32px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border: 2px solid #d00;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #d00;
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { background: #f00; }
    </style>
    <!-- Import Maps for clean module imports from CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="hud">HEALTH: 100% | AMMO: 50</div>
    <div id="message">
        <h1>DOOM CLONE</h1>
        <p>WASD to Move | Mouse to Look | Click to Shoot</p>
        <button id="startBtn">START GAME</button>
    </div>
    
    <script type="module" src="./game.js"></script>
</body>
</html>
